services:
  - type: web
    name: newsai
    env: python
    region: oregon
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --loop asyncio
    healthCheckPath: /
    envVars:
      - key: PYTHONPATH
        value: "."
      - key: NEWS_AI_CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
    autoDeploy: true
