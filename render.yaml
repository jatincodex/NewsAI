services:
  - type: web
    name: newsai
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: NEWS_AI_CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: PYTHONPATH
        value: "."
      - key: GEMINI_API_KEY
        sync: false   # Set this manually in Render dashboard
      - key: FIREBASE_PROJECT_ID
        sync: false   # Set this manually in Render dashboard (leave blank for mock mode)
