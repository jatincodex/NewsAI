services:
  - type: web
    name: newsai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NEWS_AI_CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: PYTHONPATH
        value: "."
