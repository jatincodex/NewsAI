version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: newsai_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: newsai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: newsai_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: newsai_web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8081
    volumes:
      - .:/app
    ports:
      - "8081:8081"
    environment:
      - NEWS_AI_DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/newsai
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: newsai_worker
    command: celery -A app.tasks worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - NEWS_AI_DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/newsai
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: newsai_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  pgdata:
